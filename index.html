<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raffle Draw</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎉 Raffle Draw 🎉</h1>

        <!-- Winners Section -->
        <div class="winners-section">
            <h2>🏆 Winners</h2>
            <div id="winners-list" class="winners-list">
                <div class="empty-winners">No winners yet. Start drawing!</div>
            </div>
        </div>

        <!-- Control Section -->
        <div class="control-section">
            <button id="draw-button" class="draw-button">Draw Next Prize</button>
            <div id="prize-status" class="prize-status"></div>
        </div>

        <!-- Ticket Grid -->
        <div class="grid-section">
            <h2 id="tickets-heading">🎫 Sold Tickets</h2>
            <div id="ticket-grid" class="ticket-grid"></div>
        </div>

        <!-- Winner Modal -->
        <div id="winner-modal" class="modal">
            <div class="modal-content">
                <h2>🎊 We have a winner! 🎊</h2>
                <div id="modal-ticket" class="modal-ticket"></div>
                <div id="modal-prize" class="modal-prize"></div>
                <button id="modal-close" class="modal-close">Close</button>
            </div>
        </div>
    </div>

    <script type="module" src="raffle.js"></script>
</body>
</html>
