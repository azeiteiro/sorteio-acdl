<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorteio de Primavera</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🌸🎉 Sorteio de Primavera 2026 🎉🌸</h1>
      <h3>Organizado pela Associação Cultural e Desportiva da Lentisqueira</h3>

      <!-- Winners Section -->
      <div class="winners-section">
        <h2>🏆 Vencedores</h2>
        <div id="winners-list" class="winners-list">
          <div class="empty-winners">
            Sem vencedores ainda. Inicie o sorteio!
          </div>
        </div>
      </div>

      <!-- Control Section -->
      <div class="control-section">
        <button id="draw-button" class="draw-button">
          Sortear próximo Prémio
        </button>
        <div id="prize-status" class="prize-status"></div>
      </div>

      <!-- Ticket Grid -->
      <div class="grid-section">
        <h2 id="tickets-heading">🎫 Rifas Vendidas</h2>
        <div id="ticket-grid" class="ticket-grid"></div>
      </div>

      <!-- Winner Modal -->
      <div id="winner-modal" class="modal">
        <div class="modal-content">
          <h2>🎊 Temos um vencedor! 🎊</h2>
          <div id="modal-ticket" class="modal-ticket"></div>
          <div id="modal-prize" class="modal-prize"></div>
          <button id="modal-close" class="modal-close">Fechar</button>
        </div>
      </div>
    </div>

    <script type="module" src="raffle.js"></script>
  </body>
</html>
