<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorteio de Primavera</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🌸🎉 Sorteio de Primavera 2026 🎉🌸</h1>

      <div class="header-with-logo">
        <img src="logo.png" alt="Logo ACDL" class="logo" />
        <h3>Organizado pela Associação Cultural e Desportiva da Lentisqueira</h3>
      </div>

      <!-- Winners Section -->
      <div class="winners-section">
        <h2>🏆 Vencedores</h2>
        <div id="winners-list" class="winners-list">
          <div class="empty-winners">
            Sem vencedores ainda. Inicie o sorteio!
          </div>
        </div>
      </div>

      <!-- Control Section -->
      <div class="control-section">
        <button id="draw-button" class="draw-button">
          Sortear próximo Prémio
        </button>
        <div id="current-number" class="current-number">?</div>
        <div id="prize-status" class="prize-status"></div>
      </div>

      <!-- Ticket Grid -->
      <div class="grid-section">
        <h2 id="tickets-heading">🎫 Rifas Vendidas</h2>
        <div id="ticket-grid" class="ticket-grid"></div>
      </div>

      <div id="winner-modal" class="modal">
        <div class="modal-content">
          <span class="close-button" id="modal-close">&times;</span>
          <h2>Temos Vencedor! 🎉</h2>
          <div class="winning-ticket" id="modal-ticket">#---</div>
          <div class="winning-name" id="modal-name">Nome do Comprador</div>
          <div class="prize-won" id="modal-prize">---</div>
        </div>
      </div>
    </div>

    <script type="module" src="raffle.js"></script>
  </body>
</html>
